name: Build ugbio_base docker
on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag"
        required: true
        type: string

permissions:
  id-token: write # Required for assuming an AWS role
  contents: read # Required for actions/checkout

jobs:
  build-runtime:
    uses: ./.github/workflows/build-workspace-docker.yml
    secrets: inherit
    with:
      workspace-folder: .
      docker-file: ugbio_base/Dockerfile
      docker-image: ugbio_base
      docker-tag: ${{ inputs.image-tag }}

  build-builder:
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
    with:
      git-repo: ${{ github.repository }}
      git-ref: ${{ github.ref_name }}
      docker-file: ugbio_base/Dockerfile
      docker-image: ugbio_base_build
      docker-tag: ${{ inputs.image-tag }}
      docker-target: builder
