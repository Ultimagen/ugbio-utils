name: "Run ugbio workspace tests"
description: "general action to build and run test of ugbio workspace"

inputs:
  workspace-folder:
    description: "workspace folder under src"
    required: true
  docker-file:
    description: "Dockerfile path (from repository root)"
    required: true
  docker-context:
    description: "Docker build context"
    required: false
    default: "."
  aws-account:
    description: "AWS account id"
    required: true
  aws-region:
    description: "AWS region"
    required: true
  aws-role-name:
    description: "AWS role name"
    required: true
  ugbio_base_image:
      description: "Fallback base image (image:tag) when the Dockerfile has no ARG BASE_IMAGE default."
      required: false
  ugbio_base_build_image:
      description: "Fallback build-stage image (image:tag) when the Dockerfile has no ARG BASE_BUILD_IMAGE default."
      required: false
  github-token:
      description: "GitHub token for private repository access"
      required: false

runs:
  using: "composite"

  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: arn:aws:iam::${{ inputs.aws-account }}:role/${{ inputs.aws-role-name }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@v1

    - name: Extract BASE_IMAGE and BASE_BUILD_IMAGE from Dockerfile
      id: extract-base-image
      shell: bash
      run: |
        # Only use the Dockerfile default when it contains a tag (image:tag).
        # Plain names without a tag are placeholders — fall back to ugbio_base_image input.
        BASE=$(grep -oP '(?<=ARG BASE_IMAGE=)\S+:\S+' ${{ inputs.docker-file }} || true)
        if [ -z "$BASE" ]; then
          BASE="${{ inputs.ugbio_base_image }}"
        fi
        echo "base_image=${BASE}" >> "${GITHUB_OUTPUT}"

        BASE_BUILD=$(grep -oP '(?<=ARG BASE_BUILD_IMAGE=)\S+:\S+' ${{ inputs.docker-file }} || true)
        if [ -z "$BASE_BUILD" ]; then
          BASE_BUILD="${{ inputs.ugbio_base_build_image }}"
        fi
        echo "base_build_image=${BASE_BUILD}" >> "${GITHUB_OUTPUT}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build docker
      uses: docker/build-push-action@v6
      with:
        file: ${{ inputs.docker-file }}
        context: ${{ inputs.docker-context }}
        provenance: false
        load: true
        push: false
        tags: ${{ inputs.workspace-folder }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        secrets: |
          github_token=${{ inputs.github-token }}
        build-args: |
          BASE_IMAGE=${{ steps.ecr-login.outputs.registry }}/${{ steps.extract-base-image.outputs.base_image }}
          BASE_BUILD_IMAGE=${{ steps.ecr-login.outputs.registry }}/${{ steps.extract-base-image.outputs.base_build_image }}

    - name: Run python tests (if exist) in the container
      working-directory: src/${{ inputs.workspace-folder }}
      shell: bash
      run: docker run --rm -v .:/home/ugbio/src ${{ inputs.workspace-folder }} run_tests /home/ugbio/src || [ $? -eq 5 ]
